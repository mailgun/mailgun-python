{% set pyproject = load_file_data('../pyproject.toml', from_recipe_dir=True) %}
{% set project = pyproject['project'] %}

{% set name = project['name'] %}
{% set version_match = load_file_regex(
  load_file=name.replace('-', '_') + "/_version.py",
  regex_pattern='__version__ = "(.+)"') %}
{% set version = version_match[1] %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  skip: True  # [py<310]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python
    - pip
    {% for dep in pyproject['build-system']['requires'] %}
    - {{ dep.lower() }}
    {% endfor %}
  run:
    - python
    - httpx >=0.24
    - requests >=2.32.5
    - typing-extensions >=4.7.1  # [py<311]

test:
  imports:
    - mailgun
    - mailgun.handlers
    - mailgun.examples
  source_files:
    - tests/unit/
  requires:
    - pip
    - pytest
    - pytest-asyncio
  commands:
    - pip check
    - pytest tests/unit/ -v

about:
  home: {{ project['urls']['Homepage'] }}
  dev_url: {{ project['urls']['Repository'] }}
  doc_url: {{ project['urls']['Documentation'] }}
  summary: {{ project['description'] }}
  description: {{ project['description'] }}
  license: {{ project['license'] }}
  license_family: {{ project['license'].split('-')[0] }}
  license_file: LICENSE
