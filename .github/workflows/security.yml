name: Continuous Security Verification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '37 3 * * 0' # Run weekly on Sundays to catch newly published CVEs

permissions:
  contents: read

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v7
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v6
        with:
          python-version: "3.13"
          cache: 'pip'
      - run: python -m pip install --upgrade pip
      - run: pip install ruff bandit mypy pip-audit
      # Fast checks
      - run: ruff check .
      - run: bandit -c pyproject.toml -r mailgun
      - run: mypy --strict mailgun

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v7
      - uses: returntocorp/semgrep-action@1213f56ce0ea45e9fca2127163f45dc25fb51296 # v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/supply-chain
            p/command-injection
            p/insecure-transport
          error: true # Fails CI if issues found

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v7
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v6
        with: { python-version: "3.13" }
      - run: python -m pip install --upgrade pip
      - run: pip install pip-audit
      - run: pip-audit --strict

  osv-scan:
    permissions:
      actions: read
      security-events: write # For Security Tab
      contents: read
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8"
    with:
      # Explicit root scanning
      scan-args: |-
        --recursive
        ./
