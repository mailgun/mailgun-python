name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v6
        with:
          python-version: '3.13'

      - name: Build package
        run: |
          pip install --upgrade build setuptools wheel setuptools-scm twine
          python -m build
          twine check dist/*

      - name: Test installation
        run: |
          # Install the built wheel to ensure packaging didn't miss files
          pip install dist/*.whl
          python -c "import mailgun; from importlib.metadata import version; print(f'Successfully installed v{version(\"mailgun\")}')"
