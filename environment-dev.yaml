---
name: mailgun-dev
channels:
  - defaults
dependencies:
  - python >=3.10
  # build & host deps
  - pip
  - setuptools-scm
  # PyPi only
  - python-build
  # runtime deps
  - requests >=2.32.5
  - httpx >=0.24.0
  - typing_extensions >=4.7.1  # [py<311]
  # tests
  - conda-forge::pyfakefs
  - coverage >=4.5.4
  - openssl
  - pytest >=9.0.3
  - pytest-asyncio
  - pytest-benchmark
  - pytest-cov
  - pytest-xdist
  - responses
  # linters, formatters & typing
  - make
  - mypy
  - pyright
  - ruff
  - toml
  - types-requests
  # other
  - conda
  - jsonschema
  - pre-commit
  - python-dotenv >=0.19.2
  - types-jsonschema
  - pip:
      - bandit
      - codecov >=2.0.16
      - docconvert
      - pystra
      - pyment >=0.3.3
      - pytest-order
      - scalene >=1.3.16
      - snakeviz
      - typos
      - vulture
      - wily >=1.2
      # PyPI
      - twine
